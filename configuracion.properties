# ============================================================
#  SISTEMA BIOMETRICO UMG - Sede La Florida Zona 19
#  Archivo de Configuracion Principal
#
#  Edite este archivo con sus datos antes de ejecutar el JAR.
#  Debe estar en la misma carpeta que el archivo .jar
# ============================================================

# --- Base de Datos PostgreSQL ---
# El sistema crea las tablas automaticamente al primer inicio.
# Cree primero la base de datos con:
#   psql -U postgres -c "CREATE DATABASE biometrico_umg;"
# O ejecute el script completo:
#   psql -U postgres -d biometrico_umg -f esquema_bd.sql
bd.host=localhost
bd.puerto=5432
bd.nombre=biometrico_umg
bd.usuario=postgres
bd.contrasena=admin

# --- Correo Electronico SMTP ---
# Para Gmail:
#   1. Active la verificacion en 2 pasos en su cuenta Google
#   2. Genere una "Contrasena de aplicacion" en:
#      myaccount.google.com > Seguridad > Contrasenas de aplicaciones
#   3. Use esa contrasena (16 caracteres) en correo.contrasena
# Deje correo.usuario VACIO para deshabilitar el envio de correos.
correo.host=smtp.gmail.com
correo.puerto=587
correo.usuario=
correo.contrasena=

# --- WhatsApp via CallMeBot (API gratuita) ---
# Para activar:
#   1. Abra WhatsApp y envie este mensaje al numero +34 644 82 93 46:
#      I allow callmebot to send me messages
#   2. Espere la respuesta con su apikey (puede tardar 1-2 minutos)
#   3. Pegue esa apikey en la linea de abajo
#   Los numeros de telefono de los usuarios deben incluir codigo de pais
#   sin '+' ni espacios. Ej: Guatemala = 502XXXXXXXX
# Deje whatsapp.apikey VACIO para deshabilitar las notificaciones.
whatsapp.apikey=

# --- Directorios de almacenamiento ---
# Fotos de personas registradas
fotos.directorio=fotos_personas
# Carnets PDF generados
carnets.directorio=carnets
# Reportes PDF de asistencia
reportes.directorio=reportes
