# ── APLICACIÓN ──────────────────────────────────────────────
spring.application.name=biometrico-umg
server.port=8081

# ── BASE DE DATOS (SERVIDOR REMOTO) ─────────────────────────
spring.datasource.url=jdbc:postgresql://46.62.223.162:5432/biometrico_umg
spring.datasource.username=biometrico_umg_user
spring.datasource.password=Biometrico2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / HIBERNATE ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── THYMELEAF ───────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── ARCHIVOS SUBIDOS ─────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Directorio de fotografias
app.upload.dir=uploads/fotos

# ── CORREO ELECTRÓNICO ───────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply.umg.biometrico@gmail.com
spring.mail.password=CAMBIAR_PASSWORD_AQUI
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── LOGS ─────────────────────────────────────────────────────
logging.level.com.umg=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
