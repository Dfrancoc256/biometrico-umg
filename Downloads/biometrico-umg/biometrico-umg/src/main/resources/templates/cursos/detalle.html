<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Detalle de Curso', ${activeMenu})}">
<body>
<th:block th:fragment="content">

  <div class="page-header" th:if="${curso != null}">
    <div>
      <h2><i class="fas fa-book" style="margin-right:10px;color:var(--umg-azul);"></i>
        <span th:text="${curso.nombre}">Curso</span>
      </h2>
      <p class="breadcrumb">
        <a th:href="@{/cursos}">Cursos</a> &rsaquo;
        <span th:text="${curso.codigo}">cod</span>
      </p>
    </div>
    <a th:href="@{/asistencia/curso/{id}(id=${curso.id})}" class="btn btn-success">
      <i class="fas fa-clipboard-check"></i> Tomar Asistencia
    </a>
  </div>

  <div style="display:grid;grid-template-columns:1fr 2fr;gap:24px;" th:if="${curso != null}">

    <!-- Info del curso -->
    <div>
      <div class="card">
        <div class="card-header"><h5>Información del Curso</h5></div>
        <div class="card-body">
          <p><strong>Código:</strong> <code th:text="${curso.codigo}">—</code></p>
          <p><strong>Nombre:</strong> <span th:text="${curso.nombre}">—</span></p>
          <p><strong>Catedrático:</strong> <span th:text="${curso.catedratico != null ? curso.catedratico.nombreCompleto : '—'}">—</span></p>
          <p><strong>Salón:</strong> <span th:text="${curso.salon}">—</span></p>
          <p><strong>Horario:</strong> <span th:text="${curso.horario}">—</span></p>
        </div>
      </div>

      <!-- Inscribir estudiante -->
      <div class="card" style="margin-top:20px;">
        <div class="card-header"><h5><i class="fas fa-user-plus"></i> Inscribir Estudiante</h5></div>
        <div class="card-body">
          <form th:action="@{/cursos/{id}/inscribir(id=${curso.id})}" method="post">
            <div class="form-group">
              <label class="form-label">Seleccionar Estudiante</label>
              <select class="form-control" name="estudianteId" required>
                <option value="">-- Seleccione --</option>
                <option th:each="e : ${todosEstudiantes}"
                        th:value="${e.id}"
                        th:text="${e.nombreCompleto + ' (' + e.numeroCarnet + ')'}">Estudiante</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-plus"></i> Inscribir
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Lista de estudiantes inscritos -->
    <div>
      <div class="card">
        <div class="card-header">
          <h5><i class="fas fa-users" style="margin-right:8px;"></i>
            Estudiantes Inscritos (<span th:text="${#lists.size(estudiantes)}">0</span>)
          </h5>
        </div>
        <div class="card-body" style="padding:0;">
          <div class="table-wrapper">
            <table class="umg-table">
              <thead>
                <tr><th>#</th><th>Foto</th><th>Nombre</th><th>Carnet</th><th>Correo</th><th>Acciones</th></tr>
              </thead>
              <tbody>
                <tr th:each="ce, iter : ${estudiantes}">
                  <td th:text="${iter.count}">1</td>
                  <td>
                    <img th:if="${ce.estudiante.fotoRuta != null}"
                         th:src="@{'/' + ce.estudiante.fotoRuta}" class="avatar-sm" alt="Foto"/>
                    <div th:unless="${ce.estudiante.fotoRuta != null}" class="avatar-sm avatar-placeholder">
                      <i class="fas fa-user"></i>
                    </div>
                  </td>
                  <td><strong th:text="${ce.estudiante.nombreCompleto}">Nombre</strong></td>
                  <td><code th:text="${ce.estudiante.numeroCarnet}">carnet</code></td>
                  <td><small th:text="${ce.estudiante.correo}">correo</small></td>
                  <td>
                    <form th:action="@{/cursos/{id}/desinscribir(id=${curso.id})}" method="post" style="display:inline;">
                      <input type="hidden" name="estudianteId" th:value="${ce.estudiante.id}"/>
                      <button type="submit" class="btn btn-danger btn-xs"
                              data-confirm="¿Quitar a este estudiante del curso?">
                        <i class="fas fa-times"></i>
                      </button>
                    </form>
                  </td>
                </tr>
                <tr th:if="${estudiantes == null or #lists.isEmpty(estudiantes)}">
                  <td colspan="6" style="text-align:center;color:#7a8898;padding:30px;">
                    No hay estudiantes inscritos en este curso.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

</th:block>
</body>
</html>
