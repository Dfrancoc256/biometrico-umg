<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión | Biométrico UMG</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="login-page">

  <!-- Arte lateral -->
  <div class="login-art">
    <img th:src="@{/img/logo-umg.png}" alt="Universidad Mariano Gálvez"/>
    <h1>Universidad Mariano Gálvez<br/>de Guatemala</h1>
    <p>Sistema de Registro Biométrico de Ingreso<br/>Sede La Florida · Zona 19 · 2026</p>
    <div style="margin-top:32px;display:flex;gap:24px;opacity:.6;font-size:28px;">
      <i class="fas fa-camera"></i>
      <i class="fas fa-fingerprint"></i>
      <i class="fas fa-shield-alt"></i>
      <i class="fas fa-id-card"></i>
    </div>
  </div>

  <!-- Panel de formulario -->
  <div class="login-form-panel">
    <div class="login-form-inner">

      <h2>Bienvenido</h2>
      <p>Ingrese sus credenciales para acceder al sistema.</p>

      <div th:if="${errorMsg}" class="alert alert-danger">
        <i class="fas fa-exclamation-triangle"></i>
        <span th:text="${errorMsg}"></span>
      </div>
      <div th:if="${logoutMsg}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${logoutMsg}"></span>
      </div>

      <form th:action="@{/auth/login}" method="post">

        <div class="form-group">
          <label class="form-label" for="correo">
            <i class="fas fa-envelope" style="margin-right:6px;color:#7a8898;"></i>
            Correo Electrónico
          </label>
          <input type="email" class="form-control" id="correo" name="correo"
                 placeholder="usuario@umg.edu.gt" required autofocus/>
        </div>

        <div class="form-group">
          <label class="form-label" for="contrasena">
            <i class="fas fa-lock" style="margin-right:6px;color:#7a8898;"></i>
            Contraseña
          </label>
          <input type="password" class="form-control" id="contrasena" name="contrasena"
                 placeholder="••••••••" required/>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
          <i class="fas fa-sign-in-alt"></i>
          Ingresar al Sistema
        </button>

      </form>

      <p style="font-size:11px;color:#aab;margin-top:24px;text-align:center;line-height:1.5;">
        Sistema Biométrico UMG v2.0 &mdash; 2026<br/>
        Programación III &mdash; Ingeniería en Sistemas
      </p>
    </div>
  </div>

</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
