<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Reporte por Salón', ${activeMenu})}">
<body>
<th:block th:fragment="content">

  <div class="page-header">
    <div>
      <h2><i class="fas fa-chalkboard-teacher" style="margin-right:10px;color:var(--umg-azul);"></i>Reporte de Ingresos por Salón</h2>
      <p class="breadcrumb"><a th:href="@{/reportes}">Reportes</a> &rsaquo; Por Salón</p>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header"><h5><i class="fas fa-filter" style="margin-right:8px;"></i>Filtros</h5></div>
    <div class="card-body">
      <form th:action="@{/reportes/salon}" method="get"
            style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;">
        <div class="form-group" style="margin:0;min-width:220px;">
          <label class="form-label">Instalación</label>
          <select class="form-control" name="instalacionId">
            <option value="">-- Seleccione --</option>
            <option th:each="i : ${instalaciones}"
                    th:value="${i.id}" th:text="${i.nombre}"
                    th:selected="${instalacionId != null and i.id == instalacionId}">inst</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Fecha (opcional)</label>
          <input type="date" class="form-control" name="fecha"
                 th:value="${fecha != null ? fecha.toString() : ''}"/>
        </div>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-search"></i> Buscar
        </button>
      </form>
    </div>
  </div>

  <!-- Árbol jerárquico de salones -->
  <div th:if="${instalacion != null}">
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <h5><i class="fas fa-sitemap" style="margin-right:8px;"></i>
          Árbol: <span th:text="${instalacion.nombre}">inst</span>
        </h5>
      </div>
      <div class="card-body">
        <!-- Nodo raíz: Instalación -->
        <div class="tree-node nivel-1">
          <i class="fas fa-building" style="margin-right:8px;color:var(--umg-azul);"></i>
          <strong th:text="${instalacion.nombre}">Instalación</strong>
          <small style="color:#7a8898;margin-left:10px;" th:text="${instalacion.direccion}">dir</small>
        </div>

        <!-- Nivel 2: Puertas/Salones -->
        <div th:each="p : ${puertas}">
          <div class="tree-node nivel-2">
            <i class="fas fa-door-open" style="margin-right:8px;color:var(--umg-dorado);"></i>
            <strong th:text="${p.nombre}">Puerta</strong>
            <span class="badge badge-warning" style="margin-left:8px;" th:if="${p.esSalon}">Salón</span>
            <span class="badge badge-secondary" style="margin-left:8px;" th:unless="${p.esSalon}">Acceso</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Resultados detallados -->
    <div class="card" th:if="${registros != null}">
      <div class="card-header">
        <h5><i class="fas fa-list" style="margin-right:8px;"></i>
          Ingresos a Salones
          <span th:if="${fecha != null}">— <span th:text="${#temporals.format(fecha, 'dd/MM/yyyy')}">fecha</span></span>
          (<span th:text="${#lists.size(registros)}">0</span>)
        </h5>
      </div>
      <div class="card-body" style="padding:0;">
        <div class="table-wrapper">
          <table class="umg-table">
            <thead>
              <tr><th>#</th><th>Foto</th><th>Nombre</th><th>Tipo</th><th>Salón</th><th>Fecha/Hora</th></tr>
            </thead>
            <tbody>
              <tr th:each="r, iter : ${registros}">
                <td th:text="${iter.count}">1</td>
                <td>
                  <img th:if="${r.persona.fotoRuta != null}"
                       th:src="@{'/' + r.persona.fotoRuta}" class="avatar-sm" alt="Foto"/>
                  <div th:unless="${r.persona.fotoRuta != null}" class="avatar-sm avatar-placeholder">
                    <i class="fas fa-user"></i>
                  </div>
                </td>
                <td><strong th:text="${r.persona.nombreCompleto}">Nombre</strong></td>
                <td><span class="badge badge-info" th:text="${r.persona.tipoPersona}">tipo</span></td>
                <td th:text="${r.puerta.nombre}">Salón</td>
                <td th:text="${#temporals.format(r.fechaHora, 'dd/MM/yyyy HH:mm:ss')}">fecha</td>
              </tr>
              <tr th:if="${#lists.isEmpty(registros)}">
                <td colspan="6" style="text-align:center;color:#7a8898;padding:30px;">
                  Sin registros para los filtros indicados.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</th:block>
</body>
</html>
