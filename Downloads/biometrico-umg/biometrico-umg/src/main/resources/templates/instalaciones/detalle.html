<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Detalle Instalación', ${activeMenu})}">
<body>
<th:block th:fragment="content">
  <div class="page-header" th:if="${instalacion != null}">
    <div>
      <h2><i class="fas fa-building" style="margin-right:10px;color:var(--umg-azul);"></i>
        <span th:text="${instalacion.nombre}">Instalación</span>
      </h2>
      <p class="breadcrumb">
        <a th:href="@{/instalaciones}">Instalaciones</a> &rsaquo;
        <span th:text="${instalacion.nombre}">nombre</span>
      </p>
    </div>
    <a th:href="@{/instalaciones/{id}/puerta/nueva(id=${instalacion.id})}" class="btn btn-primary">
      <i class="fas fa-plus"></i> Agregar Acceso / Salón
    </a>
  </div>

  <div class="card">
    <div class="card-header">
      <h5><i class="fas fa-door-open" style="margin-right:8px;"></i>
        Accesos y Salones (<span th:text="${#lists.size(puertas)}">0</span>)
      </h5>
    </div>
    <div class="card-body" style="padding:0;">
      <div class="table-wrapper">
        <table class="umg-table">
          <thead>
            <tr><th>#</th><th>Nombre</th><th>Nivel</th><th>Tipo</th><th>Descripción</th></tr>
          </thead>
          <tbody>
            <tr th:each="p, iter : ${puertas}">
              <td th:text="${iter.count}">1</td>
              <td><strong th:text="${p.nombre}">Nombre</strong></td>
              <td><span class="badge badge-info" th:text="${p.nivel}">Nivel</span></td>
              <td>
                <span class="badge"
                      th:classappend="${p.esSalon} ? 'badge-warning' : 'badge-secondary'"
                      th:text="${p.esSalon} ? 'Salón de Clase' : 'Acceso / Puerta'">Tipo</span>
              </td>
              <td><small th:text="${p.descripcion}">—</small></td>
            </tr>
            <tr th:if="${puertas == null or #lists.isEmpty(puertas)}">
              <td colspan="5" style="text-align:center;color:#7a8898;padding:30px;">
                No hay accesos registrados. <a th:href="@{/instalaciones/{id}/puerta/nueva(id=${instalacion.id})}">Agregar uno</a>.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</th:block>
</body>
</html>
