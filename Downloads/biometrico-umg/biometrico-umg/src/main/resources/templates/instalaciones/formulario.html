<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Nueva Instalación', ${activeMenu})}">
<body>
<th:block th:fragment="content">
  <div class="page-header">
    <div>
      <h2><i class="fas fa-building" style="margin-right:10px;color:var(--umg-azul);"></i>Nueva Instalación</h2>
      <p class="breadcrumb"><a th:href="@{/instalaciones}">Instalaciones</a> &rsaquo; Nueva</p>
    </div>
  </div>
  <div class="card" style="max-width:560px;">
    <div class="card-header"><h5>Datos de la Instalación</h5></div>
    <div class="card-body">
      <form th:action="@{/instalaciones/guardar}" method="post">
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input type="text" class="form-control" name="nombre"
                 placeholder="Ej: Edificio Principal UMG La Florida" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Dirección</label>
          <input type="text" class="form-control" name="direccion"
                 placeholder="Ej: Zona 19, Guatemala"/>
        </div>
        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Guardar
          </button>
          <a th:href="@{/instalaciones}" class="btn btn-outline">
            <i class="fas fa-arrow-left"></i> Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</th:block>
</body>
</html>
