<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content}, 'Instalaciones', ${activeMenu})}">
<body>
<th:block th:fragment="content">

  <div class="page-header">
    <div>
      <h2><i class="fas fa-building" style="margin-right:10px;color:var(--umg-azul);"></i>Instalaciones</h2>
      <p class="breadcrumb">Edificios, sedes y accesos registrados</p>
    </div>
    <a th:href="@{/instalaciones/nueva}" class="btn btn-primary">
      <i class="fas fa-plus"></i> Nueva Instalación
    </a>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
    <div th:each="inst : ${instalaciones}" class="card">
      <div class="card-body" style="padding:22px;">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">
          <div style="background:#eef2f7;padding:12px;border-radius:12px;">
            <i class="fas fa-building" style="font-size:24px;color:var(--umg-azul);"></i>
          </div>
          <div>
            <h4 style="font-size:15px;font-weight:700;color:var(--umg-azul);margin:0;" th:text="${inst.nombre}">Nombre</h4>
            <p style="font-size:12px;color:#7a8898;margin:0;" th:text="${inst.direccion}">Dirección</p>
          </div>
        </div>
        <div style="display:flex;gap:10px;">
          <a th:href="@{/instalaciones/{id}(id=${inst.id})}" class="btn btn-outline btn-sm" style="flex:1;justify-content:center;">
            <i class="fas fa-eye"></i> Ver Accesos
          </a>
          <a th:href="@{/instalaciones/{id}/puerta/nueva(id=${inst.id})}" class="btn btn-primary btn-sm">
            <i class="fas fa-plus"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${instalaciones == null or #lists.isEmpty(instalaciones)}" class="card" style="margin-top:16px;">
    <div class="card-body" style="text-align:center;padding:60px;color:#7a8898;">
      <i class="fas fa-building" style="font-size:40px;display:block;margin-bottom:14px;"></i>
      No hay instalaciones registradas.
      <br/><br/>
      <a th:href="@{/instalaciones/nueva}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Registrar primera instalación
      </a>
    </div>
  </div>

</th:block>
</body>
</html>
